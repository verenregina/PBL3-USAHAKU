# Menentukan provider yang digunakan
[providers.php]
version = "8.4"

# Memaksa instalasi paket PHP 8.4 beserta extension yang dibutuhkan Laravel
[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs"]

[phases.build]
cmds = [
    "composer install --ignore-platform-reqs --no-dev --optimize-autoloader",
    "npm install && npm run build"
]

[phases.start]
cmd = "php artisan serve --host 0.0.0.0 --port ${PORT}"